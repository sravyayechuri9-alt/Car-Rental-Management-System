<!DOCTYPE html>
<html>
<head>
    <title>Online Car Rental System</title>
    <style>
        body { font-family: Arial; margin: 0; }
        nav { background: #1e3a5f; padding: 15px; text-align: center; }
        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-size: 18px;
            cursor: pointer;
        }
        .section { display: none; padding: 30px; text-align: center; }
        input, select, textarea {
            padding: 10px;
            margin: 10px;
            width: 250px;
        }
        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav>
    <a onclick="showSection('home')">Home</a>
    <a onclick="showSection('booking')">Book Car</a>
    <a onclick="showSection('contact')">Contact</a>
</nav>

<!-- Home -->
<div id="home" class="section">
    <h2>Welcome to Online Car Rental System</h2>
    <p>Book your favorite car easily and quickly.</p>
</div>

<!-- Booking -->
<div id="booking" class="section">
    <h2>Book Your Car</h2>

    <select id="car">
        <option value="">Select Car</option>
        <option>Swift</option>
        <option>Innova</option>
        <option>Creta</option>
    </select><br>

    <input type="date" id="startDate"><br>
    <input type="date" id="endDate"><br>

    <button onclick="bookCar()">Confirm Booking</button>
</div>

<!-- Contact -->
<div id="contact" class="section">
    <h2>Contact Us</h2>

    <input type="text" id="name" placeholder="Your Name"><br>
    <input type="email" id="email" placeholder="Your Email"><br>
    <textarea id="message" placeholder="Your Message"></textarea><br>

    <button onclick="sendMessage()">Send Message</button>
</div>

<script>
// Show section
function showSection(sectionId) {
    let sections = document.querySelectorAll(".section");
    sections.forEach(sec => sec.style.display = "none");

    document.getElementById(sectionId).style.display = "block";
}

// Default page
showSection('home');

// Booking function
function bookCar() {
    let car = document.getElementById("car").value;
    let start = document.getElementById("startDate").value;
    let end = document.getElementById("endDate").value;

    if(car === "" || start === "" || end === "") {
        alert("Please fill all details!");
        return;
    }

    let booking = {
        car: car,
        startDate: start,
        endDate: end
    };

    localStorage.setItem("booking", JSON.stringify(booking));
    alert("Booking Confirmed!");
}

// Contact function
function sendMessage() {
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let message = document.getElementById("message").value;

    if(name === "" || email === "" || message === "") {
        alert("Please fill all fields!");
        return;
    }

    let contact = {
        name: name,
        email: email,
        message: message
    };

    localStorage.setItem("contact", JSON.stringify(contact));
    alert("Message Sent Successfully!");
}
</script>

</body>
</html>
